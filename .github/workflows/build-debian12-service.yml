name: Build Debian 12 Headless Service

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-debian12-service:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Build in Debian 12 container
        shell: bash
        run: |
          set -euxo pipefail

          docker run --rm \
            -v "${GITHUB_WORKSPACE}:/workspace" \
            -w /workspace \
            debian:bookworm \
            bash -lc '
              set -euxo pipefail
              export DEBIAN_FRONTEND=noninteractive

              apt-get update
              apt-get install -y --no-install-recommends \
                ca-certificates \
                git \
                build-essential \
                cmake \
                doxygen \
                pkg-config \
                libminiupnpc-dev \
                libsqlite3-dev \
                libxapian-dev \
                libz-dev \
                libssl-dev \
                libsqlcipher-dev \
                libupnp-dev \
                libspeex-dev \
                libspeexdsp-dev \
                libxslt1-dev \
                libjson-c-dev \
                rapidjson-dev \
                libcurl4-openssl-dev \
                libmicrohttpd-dev \
                libxss-dev \
                libsecret-1-dev \
                libbz2-dev \
                libasio-dev \
                libbotan-2-dev

              git config --global --add safe.directory /workspace
              git config --global --add safe.directory /workspace/supportlibs/librnp
              git config --global --add safe.directory /workspace/supportlibs/restbed

              git submodule update --init --remote --force \
                libbitdht/ \
                libretroshare/ \
                openpgpsdk/ \
                retroshare-webui/

              git submodule update --init --force \
                supportlibs/librnp \
                supportlibs/restbed \
                supportlibs/rapidjson

              rm -rf /workspace/.ci-artifacts
              mkdir -p \
                /workspace/.ci-artifacts/build/supportlibs/librnp/Build \
                /workspace/.ci-artifacts/build \
                /workspace/.ci-artifacts/stage

              cmake -S /workspace/supportlibs/librnp -B /workspace/.ci-artifacts/build/supportlibs/librnp/Build \
                -DCMAKE_BUILD_TYPE=Release \
                -DCMAKE_INSTALL_PREFIX=/usr/local \
                -DBUILD_SHARED_LIBS=ON \
                -DBUILD_TESTING=OFF
              cmake --build /workspace/.ci-artifacts/build/supportlibs/librnp/Build --parallel "$(nproc)"
              cmake --install /workspace/.ci-artifacts/build/supportlibs/librnp/Build
              ldconfig

              cd /workspace/.ci-artifacts/build
              cmake -S /workspace/retroshare-service -B . \
                -DCMAKE_BUILD_TYPE=Release \
                -DCMAKE_INSTALL_PREFIX=/usr/local \
                -DRS_RNPLIB=ON \
                -DRS_JSON_API=ON \
                -DRS_WEBUI=ON \
                -DRS_SERVICE_TERMINAL_LOGIN=ON \
                -DRS_SERVICE_TERMINAL_WEBUI_PASSWORD=ON

              cmake --build . --parallel "$(nproc)"
              DESTDIR=/workspace/.ci-artifacts/stage cmake --install .
              mkdir -p /workspace/.ci-artifacts/stage/usr/local/lib
              find /usr/local/lib /usr/local/lib64 \
                -maxdepth 1 \
                \( -name "librnp*.so*" -o -name "libsexpp*.so*" \) \
                -exec cp -a {} /workspace/.ci-artifacts/stage/usr/local/lib/ \; \
                2>/dev/null || true

              LD_LIBRARY_PATH=/usr/local/lib ldd retroshare-service \
                > /workspace/.ci-artifacts/ldd-retroshare-service.txt
            '

      - name: Assemble artifact payload
        shell: bash
        run: |
          set -euxo pipefail

          PREFIX=".ci-artifacts/stage/usr/local"
          OUT=".ci-artifacts/retroshare-debian12-service"

          rm -rf "${OUT}"
          mkdir -p "${OUT}/bin" "${OUT}/lib" "${OUT}/share/retroshare" "${OUT}/deploy"

          cp -a "${PREFIX}/bin/retroshare-service" "${OUT}/bin/"
          if compgen -G "${PREFIX}/lib/libretroshare*.so*" > /dev/null; then
            cp -a "${PREFIX}/lib"/libretroshare*.so* "${OUT}/lib/"
          fi
          if compgen -G "${PREFIX}/lib/librnp*.so*" > /dev/null; then
            cp -a "${PREFIX}/lib"/librnp*.so* "${OUT}/lib/"
          fi
          if compgen -G "${PREFIX}/lib/libsexpp*.so*" > /dev/null; then
            cp -a "${PREFIX}/lib"/libsexpp*.so* "${OUT}/lib/"
          fi
          cp -a "${PREFIX}/share/retroshare/webui" "${OUT}/share/retroshare/"

          cp "build_scripts/Debian+Ubuntu/RetroShareHeadlessDeployment.md" \
            "${OUT}/README-DEPLOY.md"
          cp "build_scripts/Debian+Ubuntu/retroshare-headless.service" \
            "${OUT}/deploy/retroshare.service"
          cp ".ci-artifacts/ldd-retroshare-service.txt" "${OUT}/deploy/"

          {
            echo "git_commit=$(git rev-parse HEAD)"
            echo "build_time_utc=$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          } > "${OUT}/deploy/build-info.txt"

          find "${OUT}" \( -type f -o -type l \) | sort > "${OUT}/deploy/manifest.txt"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: retroshare-debian12-service
          path: .ci-artifacts/retroshare-debian12-service
          if-no-files-found: error
          retention-days: 14
