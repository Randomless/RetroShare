name: Build RetroShare Service (qmake, Debian Bookworm)  
  
on:  
  workflow_dispatch:  
  
permissions:  
  contents: read  
  
jobs:  
  build-service:  
    runs-on: ubuntu-latest  
    container:  
      image: debian:bookworm  
  
    steps:  
      - name: Install dependencies  
        env:  
          DEBIAN_FRONTEND: noninteractive  
        run: |  
          apt-get update  
          apt-get install -y --no-install-recommends \  
            ca-certificates \  
            git \  
            g++ \  
            make \  
            cmake \  
            pkg-config \  
            doxygen \  
            qt5-qmake \  
            qtmultimedia5-dev \  
            libqt5x11extras5-dev \  
            libbz2-dev \  
            libjson-c-dev \  
            libssl-dev \  
            libsqlcipher-dev \  
            libupnp-dev \  
            rapidjson-dev \  
            libasio-dev \  
            libbotan-2-dev \  
            libminiupnpc-dev \  
            libxapian-dev \  
            zlib1g-dev \  
            libxss-dev \  
            libsecret-1-dev \  
            libxml2-dev \  
            libxslt1-dev \  
            libcurl4-openssl-dev  
  
      - name: Checkout repository  
        uses: actions/checkout@v4  
        with:  
          persist-credentials: false  
  
      - name: Init submodules  
        run: |  
          git config --global --add safe.directory "$GITHUB_WORKSPACE"  
          git submodule update --init --remote --force \  
            libbitdht/ \  
            libretroshare/ \  
            openpgpsdk/ \  
            retroshare-webui/  
          git submodule update --init --force \  
            supportlibs/librnp \  
            supportlibs/restbed \  
            supportlibs/rapidjson  
  
      - name: Build with qmake  
        run: |  
          qmake CONFIG+=release \  
                CONFIG+=rs_jsonapi \  
                CONFIG+=rs_webui \  
                CONFIG+=no_retroshare_gui  
          make -j$(nproc)  
  
      - name: Collect artifact  
        run: |  
          mkdir -p .ci-artifacts/retroshare-debian12-service/bin  
          mkdir -p .ci-artifacts/retroshare-debian12-service/share/retroshare  
          cp retroshare-service/src/retroshare-service \  
            .ci-artifacts/retroshare-debian12-service/bin/  
          if [ -d retroshare-webui/dist ]; then  
            cp -r retroshare-webui/dist \  
              .ci-artifacts/retroshare-debian12-service/share/retroshare/webui  
          fi  
          echo "git_commit=$(git rev-parse HEAD)" \  
            > .ci-artifacts/retroshare-debian12-service/build-info.txt  
          echo "build_time_utc=$(date -u +%Y-%m-%dT%H:%M:%SZ)" \  
            >> .ci-artifacts/retroshare-debian12-service/build-info.txt  
  
      - name: Upload artifact  
        uses: actions/upload-artifact@v4  
        with:  
          name: retroshare-debian12-service-qmake  
          path: .ci-artifacts/retroshare-debian12-service  
          if-no-files-found: error  
          retention-days: 14